name: Feature Request
description: 提交新功能、产品改进或工作流优化建议
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请尽量描述具体使用场景，而不是只给出抽象需求。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 说明当前痛点、限制或低效之处
      placeholder: 在什么场景下，现有行为不足以解决问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 描述你希望看到的行为、交互或配置能力
      placeholder: 希望新增什么能力？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案或权衡
      description: 你是否考虑过其他做法？为什么它们不够好？
      placeholder: 目前是否有可接受但不理想的替代方案？
  - type: input
    id: affected-area
    attributes:
      label: 影响范围
      description: 例如 Dashboard / Providers / Sessions / Launch / Sync
      placeholder: Dashboard
  - type: textarea
    id: extra
    attributes:
      label: 其他补充信息
      description: 可附原型、截图、参考链接或使用示例
