name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: AiCliManager

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release-meta.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release-meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_version="${GITHUB_REF_NAME}"
          else
            release_version="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            goos: windows
            arch: amd64
            runner: windows-latest
            archive_format: zip
            build_tags: ""
          - platform: windows
            goos: windows
            arch: arm64
            runner: windows-latest
            archive_format: zip
            build_tags: ""
          - platform: linux
            goos: linux
            arch: amd64
            runner: ubuntu-24.04
            archive_format: tar.gz
            build_tags: webkit2_41
          - platform: linux
            goos: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            archive_format: tar.gz
            build_tags: webkit2_41
          - platform: macos
            goos: darwin
            arch: amd64
            runner: macos-latest
            archive_format: zip
            build_tags: ""
          - platform: macos
            goos: darwin
            arch: arm64
            runner: macos-latest
            archive_format: zip
            build_tags: ""

    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate version consistency
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs')
          const wails = JSON.parse(fs.readFileSync('wails.json', 'utf8'))
          const frontend = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'))
          const releaseVersion = process.env.RELEASE_VERSION
          const normalizedReleaseVersion = releaseVersion.startsWith('v') ? releaseVersion.slice(1) : releaseVersion

          if (wails.version !== frontend.version) {
            console.error(`Version mismatch: wails.json=${wails.version}, frontend/package.json=${frontend.version}`)
            process.exit(1)
          }

          if (releaseVersion.startsWith('v') && wails.version !== normalizedReleaseVersion) {
            console.error(`Tag version mismatch: tag=${releaseVersion}, wails.json=${wails.version}`)
            process.exit(1)
          }
          EOF

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        shell: bash
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          build_cmd=(wails build -clean -platform "${{ matrix.goos }}/${{ matrix.arch }}")
          if [[ -n "${{ matrix.build_tags || '' }}" ]]; then
            build_cmd+=(-tags "${{ matrix.build_tags }}")
          fi
          "${build_cmd[@]}"

      - name: Archive Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $artifact = "${env:APP_NAME}-${env:RELEASE_VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_format }}"
          $stageDir = Join-Path $env:RUNNER_TEMP 'release-stage'
          if (Test-Path $stageDir) {
            Remove-Item $stageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Path build/bin/* -Destination $stageDir -Recurse -Force
          if (Test-Path $artifact) {
            Remove-Item $artifact -Force
          }
          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $artifact -Force
          "ARTIFACT_NAME=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Archive Linux and macOS artifacts
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          artifact="${APP_NAME}-${RELEASE_VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_format }}"
          stage_dir="${RUNNER_TEMP}/release-stage"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp -R build/bin/. "$stage_dir/"
          if [[ "${{ matrix.archive_format }}" == "tar.gz" ]]; then
            tar -C "$stage_dir" -czf "$artifact" .
          else
            (cd "$stage_dir" && zip -r "$GITHUB_WORKSPACE/$artifact" .)
          fi
          echo "ARTIFACT_NAME=$artifact" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ARTIFACT_NAME }}

  publish-release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
